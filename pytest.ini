[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests as integration tests
    timeout: marks tests with a timeout

# Default timeout (seconds) — overridden per-test with @pytest.mark.timeout
timeout = 30

# Show short test summary info
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Test output
log_cli = false
log_level = WARNING
